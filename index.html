<style>
:root{
  --red:#d7263d; --red-dk:#a91d2f; --yellow:#ffc400; --yellow-dk:#d9a600;
  --green:#58cc02; --green-dk:#46a302; --green-bg:#d7ffb8;
  --blue:#1cb0f6; --blue-dk:#1899d6;
  --wrong:#ff4b4b; --wrong-dk:#d33131; --wrong-bg:#ffdfe0;
  --bg:#fff; --panel:#f7f7f7; --line:#e5e5e5;
  --text:#3c3c3c; --muted:#afafaf;
  --r:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none}
input{user-select:text; -webkit-user-select:text}
html,body{margin:0; background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  color:var(--text); min-height:100vh; font-size:17px}
#app{max-width:520px; margin:0 auto; padding:0 16px 40px}

h1{font-size:24px; font-weight:800; margin:12px 0}
.muted{color:var(--muted)} .small{font-size:13px}
.center{text-align:center}

/* ---- кнопки в стиле "3D press" ---- */
.btn{display:block; width:100%; padding:14px; font:inherit; font-size:16px; font-weight:800;
  letter-spacing:.5px; text-transform:uppercase; color:#fff; text-align:center;
  background:var(--green); border:0; border-radius:var(--r); cursor:pointer;
  box-shadow:0 4px 0 var(--green-dk); transition:filter .1s}
.btn:active{transform:translateY(4px); box-shadow:none}
.btn:disabled{background:var(--line); box-shadow:0 4px 0 #cfcfcf; color:var(--muted)}
.btn.red{background:var(--red); box-shadow:0 4px 0 var(--red-dk)}
.btn.red:active{box-shadow:none}
.btn.blue{background:var(--blue); box-shadow:0 4px 0 var(--blue-dk)}
.btn.blue:active{box-shadow:none}
.btn.ghost{background:#fff; color:var(--blue); box-shadow:0 4px 0 var(--line);
  border:2px solid var(--line); text-transform:none}
.btn.ghost:active{box-shadow:none}

/* ---- варианты ответов ---- */
.opt{display:block; width:100%; text-align:left; padding:14px 16px; font:inherit; font-size:17px;
  background:#fff; border:2px solid var(--line); border-bottom-width:4px;
  border-radius:var(--r); margin:8px 0; cursor:pointer; color:var(--text)}
.opt:active{border-bottom-width:2px; transform:translateY(2px)}
.opt.ok{border-color:var(--green); background:var(--green-bg); color:var(--green-dk); font-weight:700}
.opt.bad{border-color:var(--wrong); background:var(--wrong-bg); color:var(--wrong-dk)}
.opt:disabled{opacity:.85}

/* ---- шапка урока ---- */
.topbar{display:flex; align-items:center; gap:12px; padding:14px 0 6px; position:sticky;
  top:0; background:var(--bg); z-index:5}
.xbtn{background:none; border:0; font-size:22px; color:var(--muted); cursor:pointer; padding:4px}
.bar{flex:1; height:16px; background:var(--line); border-radius:8px; overflow:hidden}
.bar>div{height:100%; background:var(--green); width:0; border-radius:8px;
  transition:width .4s cubic-bezier(.22,1,.36,1); position:relative}
.bar>div::after{content:""; position:absolute; top:3px; left:8px; right:8px; height:4px;
  background:rgba(255,255,255,.35); border-radius:2px}
.combo{font-weight:800; color:var(--yellow-dk); font-size:14px; min-width:44px; text-align:right}

/* ---- карточки упражнений ---- */
.prompt{font-size:15px; font-weight:700; color:var(--muted); margin:18px 0 6px;
  text-transform:uppercase; letter-spacing:.5px}
.kyword{font-size:34px; font-weight:800; margin:10px 0; word-break:break-word}
.ruword{font-size:22px; font-weight:700; margin:10px 0; word-break:break-word}
.wordcard{background:#fff; border:2px solid var(--line); border-radius:20px;
  padding:26px 18px; margin:14px 0; text-align:center;
  animation:pop .25s cubic-bezier(.22,1.4,.36,1)}
.wordcard .tr{font-size:20px; margin-top:6px}
.wordcard .also{color:var(--muted); font-size:14px; margin-top:10px}
.topic-pill{display:inline-block; margin-top:14px; font-size:12px; font-weight:700;
  color:var(--blue); background:#e3f4fd; border-radius:999px; padding:4px 12px}
@keyframes pop{from{transform:scale(.92); opacity:0}}
@keyframes shake{20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s}

/* ---- фидбек-плашка: сразу под вопросом ---- */
.fb{margin-top:14px; border-radius:var(--r); padding:14px 16px;
  animation:fbpop .18s cubic-bezier(.22,1,.36,1)}
.fb .in{max-width:520px; margin:0 auto}
.fb.ok{background:var(--green-bg)} .fb.bad{background:var(--wrong-bg)}
.fb .t{font-size:19px; font-weight:800; margin-bottom:2px}
.fb.ok .t{color:var(--green-dk)} .fb.bad .t{color:var(--wrong-dk)}
.fb .d{font-size:15px; color:var(--text); margin-bottom:12px}
@keyframes fbpop{from{transform:translateY(8px); opacity:0}}
.padfb{padding-bottom:40px}

/* ---- ввод ---- */
input[type=text]{width:100%; padding:14px; font:inherit; font-size:19px;
  border:2px solid var(--line); border-radius:var(--r); background:var(--panel)}
input[type=text]:focus{outline:none; border-color:var(--blue); background:#fff}
.kyletters{display:flex; gap:8px; margin:10px 0}
.kyletters button{flex:1; padding:12px; font-size:19px; font-weight:700; background:#fff;
  border:2px solid var(--line); border-bottom-width:4px; border-radius:12px; cursor:pointer}
.kyletters button:active{border-bottom-width:2px; transform:translateY(2px)}

/* ---- match pairs ---- */
.match{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0}
.mbtn{padding:16px 10px; font:inherit; font-size:16px; font-weight:600; background:#fff;
  border:2px solid var(--line); border-bottom-width:4px; border-radius:var(--r); cursor:pointer;
  color:var(--text); word-break:break-word}
.mbtn.sel{border-color:var(--blue); background:#e3f4fd; color:var(--blue-dk)}
.mbtn.done{opacity:.35; border-color:var(--green); background:var(--green-bg); pointer-events:none}
.mbtn.err{animation:shake .4s; border-color:var(--wrong); background:var(--wrong-bg)}

/* ---- главный экран ---- */
.statbar{display:flex; justify-content:space-between; align-items:center;
  padding:14px 0 4px; position:sticky; top:0; background:var(--bg); z-index:5}
.stat{display:flex; align-items:center; gap:5px; font:inherit; font-weight:800; font-size:16px;
  background:none; border:0; padding:2px; cursor:pointer; color:var(--text)}
.stat .ic{font-size:20px}
.streak-c{color:#ff9600} .xp-c{color:var(--yellow-dk)} .frz-c{color:var(--blue)}
/* ---- аудио ---- */
.spk{display:inline-block;border:0;background:none;font-size:22px;cursor:pointer;
  padding:2px 6px;vertical-align:middle;line-height:1;transition:transform .1s}
.spk:active{transform:scale(1.3)}

/* ---- аудирование ---- */
.lisbtn{display:inline-block;font-size:44px;background:var(--blue);border-radius:22px;
  padding:22px 46px;margin:8px 0 14px;box-shadow:0 5px 0 var(--blue-dk);cursor:pointer;line-height:1}
.lisbtn:active{transform:translateY(4px);box-shadow:none}

/* ---- чтение ---- */
.rgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0 14px}
.rles{padding:12px 0;border:2px solid var(--line);border-bottom-width:4px;border-radius:12px;
  font:inherit;font-weight:800;background:#fff;cursor:pointer;color:var(--text)}
.rles:active{border-bottom-width:2px;transform:translateY(2px)}
.rles.done{background:var(--green-bg);border-color:var(--green);color:var(--green-dk)}
.rtext{text-align:left;font-size:16px;line-height:1.55;user-select:text;-webkit-user-select:text;
  max-height:38vh;overflow:auto;margin-bottom:10px}

/* ---- мои слова ---- */
.wtop{display:flex;align-items:center;gap:10px;margin:12px 0}
.wback{border:0;background:var(--panel);border-radius:12px;width:40px;height:40px;
  font-size:20px;cursor:pointer;color:var(--text);flex:none}
.wchips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.wchip{border:2px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;
  padding:6px 12px;font:inherit;font-size:13px;font-weight:700;cursor:pointer}
.wchip.on{border-color:var(--blue);color:var(--blue);background:#eaf7fe}
.wsearch{width:100%;padding:10px 14px;border:2px solid var(--line);border-radius:12px;
  font:inherit;margin:2px 0 10px}
.wsearch:focus{outline:none;border-color:var(--blue)}
.wlist{display:flex;flex-direction:column;gap:8px}
.wrow{display:flex;align-items:center;gap:10px;text-align:left;background:#fff;
  border:2px solid var(--line);border-radius:14px;padding:10px 12px;font:inherit;cursor:pointer}
.wrow .grow{flex:1;min-width:0}
.wky{font-weight:800;font-size:17px}
.wru{color:var(--text);opacity:.75}
.wdet{margin-top:6px;line-height:1.4}
.wst{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:15px;flex:none}
.wbar{width:44px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.wbar div{height:100%;background:var(--green)}
.wrow.hard .wbar div{background:var(--wrong)}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px}
.mcard{background:var(--bg);border-radius:var(--r);padding:20px;max-width:440px;width:100%;max-height:82vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.mcard h3{margin:0 0 10px}
.mcard p{margin:8px 0;line-height:1.45}
.goalring{width:26px; height:26px; transform:rotate(-90deg)}
.goalring circle{fill:none; stroke-width:4}
.goalring .bgc{stroke:var(--line)}
.goalring .fgc{stroke:var(--green); stroke-linecap:round; transition:stroke-dashoffset .5s}

/* ---- всплывающая подсказка к статам ---- */
.tipbox{background:#3c3c3c; color:#fff; font-size:14px; line-height:1.5; border-radius:14px;
  padding:12px 14px; margin:6px 0 2px; animation:pop .2s; cursor:pointer}

/* ---- квесты недели + грамм-подсказки ---- */
.qcard{background:#fff; border:2px solid var(--line); border-radius:16px; padding:12px 14px; margin:10px 0; text-align:left}
.qcard .qh{font-weight:800; margin-bottom:6px}
.qrow{display:flex; align-items:center; gap:8px; margin:8px 0; font-size:14px}
.qrow .qt{flex:1}
.qbar{flex:0 0 84px; height:8px; background:var(--line); border-radius:4px; overflow:hidden}
.qbar div{height:100%; background:var(--green); border-radius:4px}
.qn{font-size:12px; color:var(--muted); min-width:38px; text-align:right}
.qclaim{border:0; border-radius:10px; background:#ffc800; font:inherit; font-size:13px; font-weight:800; padding:6px 10px; cursor:pointer}
.qclaim:active{transform:scale(.95)}
.gtip{background:#fff7df; border:2px solid #ffe28a; border-radius:14px; padding:10px 12px; margin:10px 0; font-size:14px; line-height:1.45; text-align:left}

.continue{margin:14px 0}
.lvl{font-size:13px; font-weight:700; color:var(--muted); cursor:pointer}

/* ---- переключатель уровней ---- */
.lvltabs{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 2px}
.lvltab{flex:1 1 30%; min-width:30%; padding:10px 4px; font:inherit; font-size:13px; font-weight:800; cursor:pointer;
  background:#fff; color:var(--muted); border:2px solid var(--line); border-bottom-width:4px;
  border-radius:14px; text-align:center}
.lvltab .big{display:block; font-size:20px; margin-bottom:2px}
.lvltab.on{border-color:var(--blue); color:var(--blue-dk); background:#e3f4fd}
.lvltab:active{border-bottom-width:2px; transform:translateY(2px)}

/* ---- сборка предложения из плиток ---- */
.tiles,.answer{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; min-height:48px}
.answer{border-bottom:2px solid var(--line); padding-bottom:10px}
.tile{padding:10px 14px; font:inherit; font-size:17px; font-weight:600; background:#fff;
  border:2px solid var(--line); border-bottom-width:4px; border-radius:12px; cursor:pointer;
  color:var(--text)}
.tile:active{border-bottom-width:2px; transform:translateY(2px)}
.tile.used{opacity:.25; pointer-events:none}
.answer .tile{border-color:var(--blue)}

/* ---- навигация: части → этапы → юниты ---- */
.acc{display:flex; align-items:center; gap:12px; width:100%; text-align:left; font:inherit;
  color:var(--text); background:#fff; border:2px solid var(--line); border-bottom-width:4px;
  border-radius:var(--r); cursor:pointer; padding:12px 14px; margin:12px 0 0}
.acc:active{border-bottom-width:2px; transform:translateY(2px)}
.acc .grow{flex:1; min-width:0}
.acc .ttl{font-weight:800; font-size:16px}
.acc .sub{font-size:12px; color:var(--muted); margin-top:2px}
.acc .chev{color:var(--muted); font-size:14px; transition:transform .2s}
.acc.open .chev{transform:rotate(180deg)}
.acc.part.open{border-color:var(--blue)}
.acc.stage{margin-left:14px; border-radius:14px; padding:10px 12px; margin-top:10px}
.acc.stage.open{border-color:var(--blue)}
.acc.unit{margin-left:28px; border-radius:14px; padding:10px 12px; margin-top:10px}
.acc.unit.open{border-color:var(--uc,var(--green))}
.acc.go{background:#f3fbec; border-color:#b9e39a}
.acc.fin{background:linear-gradient(135deg,#fff8dd,#f2ffd8); border-color:var(--yellow)}
.acc.fin .sub{color:#b98a00}
.acc.fin .miniprog>div{background:var(--yellow)}
.acc .medal{font-size:22px; flex-shrink:0; animation:fbpop .35s}
.miniprog{height:8px; background:var(--line); border-radius:4px; overflow:hidden; margin-top:6px}
.miniprog>div{height:100%; background:var(--green); border-radius:4px}
.path{margin:14px 0 6px}

.uhead{display:flex; align-items:center; gap:12px; margin:26px 0 10px}
.uhead .num,.acc .num{flex-shrink:0; width:34px; height:34px; border-radius:10px; color:#fff;
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px}
.uhead .t{font-weight:800; font-size:16px}
.uhead .sub{font-size:12px; color:var(--muted)}

.path{display:flex; flex-direction:column; align-items:center; gap:6px}
.node{width:58px; height:58px; border-radius:50%; border:0; cursor:pointer; font-size:22px;
  display:flex; align-items:center; justify-content:center; color:#fff; position:relative;
  background:var(--line); box-shadow:0 5px 0 #cfcfcf; transition:transform .1s}
.node:active{transform:translateY(5px); box-shadow:none}
.node.done{background:var(--uc,var(--green)); box-shadow:0 5px 0 var(--ucd,var(--green-dk))}
.node.cur{background:var(--uc,var(--green)); box-shadow:0 5px 0 var(--ucd,var(--green-dk))}
.node.cur::before{content:""; position:absolute; inset:-8px; border-radius:50%;
  border:4px solid var(--uc,var(--green)); opacity:.35; animation:pulse 1.6s infinite}
@keyframes pulse{50%{transform:scale(1.12); opacity:.15}}
.node .tip{position:absolute; top:-38px; left:50%; transform:translateX(-50%);
  background:#fff; color:var(--uc,var(--green)); border:2px solid var(--line);
  font-size:12px; font-weight:800; letter-spacing:1px; padding:5px 12px; border-radius:10px;
  white-space:nowrap; animation:bob 1.6s infinite}
@keyframes bob{50%{transform:translate(-50%,-4px)}}
.zig-l{transform:translateX(-40px)} .zig-r{transform:translateX(40px)}

/* ---- финал урока ---- */
.finish{padding-top:10vh; text-align:center}
.fstats{display:flex; gap:10px; justify-content:center; margin:22px 0}
.fstat{border:2px solid; border-radius:var(--r); min-width:96px; overflow:hidden}
.fstat .h{font-size:12px; font-weight:800; color:#fff; padding:4px; text-transform:uppercase}
.fstat .v{font-size:20px; font-weight:800; padding:10px 6px; background:#fff}
.fstat.y{border-color:var(--yellow)} .fstat.y .h{background:var(--yellow)} .fstat.y .v{color:var(--yellow-dk)}
.fstat.g{border-color:var(--green)} .fstat.g .h{background:var(--green)} .fstat.g .v{color:var(--green-dk)}
.fstat.o{border-color:#ff9600} .fstat.o .h{background:#ff9600} .fstat.o .v{color:#ff9600}

/* ---- маскот: суур (гималайский сурок) ---- */
.marmot{display:inline-block; animation:mbob 2.8s ease-in-out infinite}
.marmot svg .eye,.marmot svg .head{transform-box:fill-box}
@keyframes mbob{50%{transform:translateY(-4px)}}
.marmot .eye{transform-origin:center; animation:mblink 4.6s infinite}
@keyframes mblink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.06)}}
.marmot .arm-l,.marmot .arm-r{transform-box:view-box}
.marmot .arm-l{transform-origin:90px 76px; transform:rotate(14deg)}
.marmot .arm-r{transform-origin:30px 76px; transform:rotate(-14deg)}
.marmot.wave .arm-r{animation:mwave 1.9s ease-in-out infinite}
@keyframes mwave{0%,100%{transform:rotate(-14deg)}30%{transform:rotate(150deg)}45%{transform:rotate(118deg)}60%{transform:rotate(150deg)}}
.marmot.cheer{animation:mjump .8s cubic-bezier(.3,1.6,.5,1) infinite alternate}
@keyframes mjump{from{transform:translateY(0)}to{transform:translateY(-14px)}}
.marmot.cheer .arm-l{animation:mup-l .8s ease-in-out infinite alternate}
.marmot.cheer .arm-r{animation:mup-r .8s ease-in-out infinite alternate}
@keyframes mup-l{from{transform:rotate(14deg)}to{transform:rotate(-140deg)}}
@keyframes mup-r{from{transform:rotate(-14deg)}to{transform:rotate(140deg)}}
.marmot .head{transform-origin:50% 80%; animation:mtilt 5.4s ease-in-out infinite}
@keyframes mtilt{0%,100%{transform:rotate(0)}30%{transform:rotate(-3deg)}70%{transform:rotate(3deg)}}
.marmot.happy .arm-l{animation:mup-l .5s ease-in-out 2 alternate}
.marmot.happy .arm-r{animation:mup-r .5s ease-in-out 2 alternate}
.marmot.sad{animation:none}
.marmot.sad .head{animation:msad .7s ease-out forwards}
@keyframes msad{to{transform:rotate(7deg) translateY(3px)}}
.marmot.sad .eye{animation:none; transform:scaleY(.55)}
.marmot.sad .arm-l{transform:rotate(4deg)}
.marmot.sad .arm-r{transform:rotate(-4deg)}

/* ---- анимации ответов ---- */
@keyframes okpop{40%{transform:scale(1.06)}}
.opt.pop{animation:okpop .4s}
.mbtn.done{animation:okpop .35s}
@keyframes badflash{0%,100%{background:var(--wrong-bg)}50%{background:#ffc9cb}}
.opt.bad{animation:shake .4s, badflash .6s}

#toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  background:#3c3c3c; color:#fff; padding:11px 20px; border-radius:999px; font-size:14px;
  font-weight:600; opacity:0; transition:opacity .3s; pointer-events:none; z-index:50}

<script>
/* ============ Кыргызча v0.3 — оболочка без контента.
   Микро-уроки, геймификация, маскот Суур, дизайн в духе Duolingo.
   Весь словарь/курс/фразы приходят из Firebase RTDB после входа. ============ */
'use strict';

const firebaseConfig = {
  apiKey: "AIzaSyAt9StrSkg4cxpvI-d5SmPba-nMiPXsEa8",
  authDomain: "ky-app-9c14d.firebaseapp.com",

firebase.initializeApp(firebaseConfig);

/* ---------- IndexedDB ---------- */
const DB_NAME='kyapp', DB_VER=2;
let idb;
function idbOpen(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=()=>{const d=r.result;
    if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');
    if(!d.objectStoreNames.contains('srs'))d.createObjectStore('srs');
    if(!d.objectStoreNames.contains('audio'))d.createObjectStore('audio');};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
function kvGet(k,store='kv'){return new Promise((res,rej)=>{
  const t=idb.transaction(store).objectStore(store).get(k);
  t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);});}
function kvSet(k,v,store='kv'){return new Promise((res,rej)=>{
  const t=idb.transaction(store,'readwrite').objectStore(store).put(v,k);
  t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);});}
function srsAll(){return new Promise((res,rej)=>{
  const out={}; const c=idb.transaction('srs').objectStore('srs').openCursor();
  c.onsuccess=()=>{const cur=c.result; if(cur){out[cur.key]=cur.value;cur.continue();}else res(out);};
  c.onerror=()=>rej(c.error);});}

/* ---------- Состояние ---------- */
let S={user:null, wordbank:null, course:null, byRank:{}, topicByRank:{}, srs:{}, confus:{},
  phrases:null, byPid:{}, pcourse:null,
  streak:{count:0,last:null,freezes:2}, xp:0, goal:1, doneToday:0, doneLessons:{}, settings:null};
const PID0=20000; // id фраз начинаются с 20001 — не пересекаются с freq_rank слов

const $=s=>document.querySelector(s);
const app=$('#app');
function toast(m){const t=$('#toast');t.textContent=m;t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2200);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function today(){return new Date().toISOString().slice(0,10);}
function shortTr(w){ // основной перевод: часть до ';'
  let t=(w.translation||'').split(';')[0].trim();
  if(t.length>42){t=t.slice(0,42).replace(/[,\s]+\S*$/,'')+'…';}
  return t||w.translation;}

/* ---------- Аудио: RTDB audio/w|p, кэш в IndexedDB ---------- */
let curAud=null;
async function getAudio(r){
  let b=null;
  try{b=await kvGet(String(r),'audio');}catch(e){}
  if(!b){
    try{
      const snap=await firebase.database().ref((+r<PID0?'audio/w/r':'audio/p/r')+r).get();
      if(!snap.exists())return null;
      b=snap.val(); kvSet(String(r),b,'audio');
    }catch(e){return null;}
  }
  return b;
}
async function playAudio(r){
  if(S.mute)return;
  const b=await getAudio(r); if(!b)return;
  try{
    if(curAud){curAud.pause();curAud=null;}
    curAud=new Audio('data:audio/mpeg;base64,'+b);
    curAud.play().catch(()=>{});
  }catch(e){}
}
function prefetchAudio(rs){for(const r of rs)getAudio(r);}
document.addEventListener('click',e=>{
  const s=e.target.closest('[data-spk]');
  if(s){e.stopPropagation();e.preventDefault();playAudio(+s.dataset.spk);}
},true);

/* ---------- Уровни ---------- */
const LEVELS=[[0,'Баштоочу 🌱'],[100,'Окуучу 📖'],[300,'Билгич 💡'],[700,'Чебер 🔨'],
  [1500,'Устат 🗻'],[3000,'Акын 🎵'],[6000,'Манасчы 🦅']];
function level(){let cur=LEVELS[0],next=null;
  for(const l of LEVELS){if(S.xp>=l[0])cur=l;else{next=l;break;}}
  return {name:cur[1],next};}

/* ---------- Стрик / цель ---------- */
async function loadMeta(){
  S.streak=await kvGet('streak')||{count:0,last:null,freezes:2};
  S.xp=await kvGet('xp')||0;
  S.goal=await kvGet('goal')||2;
  S.settings=await kvGet('settings')||null;
  S.doneLessons=await kvGet('doneLessons')||{};
  S.confus=await kvGet('confus')||{};
  S.week=await kvGet('week')||null;
  S.mute=await kvGet('mute')||false;
  S.tipN=await kvGet('tipn')||0;
  const dt=await kvGet('doneToday')||{d:null,n:0};
  S.doneToday=(dt.d===today())?dt.n:0;
  const st=S.streak;
  if(st.last && st.last!==today()){
    const missed=Math.floor((new Date(today())-new Date(st.last))/864e5)-1;
    if(missed>0){
      if(missed<=st.freezes){st.freezes-=missed; toast(`❄️ Заморозка спасла стрик (осталось ${st.freezes})`);}
      else {st.count=0; st.freezes=2;}
      st.last=new Date(Date.now()-864e5).toISOString().slice(0,10);
      await kvSet('streak',st);
    }
  }
}
async function registerActivity(){
  const st=S.streak; let newDay=false;
  if(st.last!==today()){
    st.count+=1; st.last=today(); newDay=true;
    if(st.count%7===0 && st.freezes<2) st.freezes=2;
    await kvSet('streak',st);
  }
  S.doneToday+=1;
  await kvSet('doneToday',{d:today(),n:S.doneToday});
  return newDay;
}

/* ---------- SM-2-lite ---------- */
const STEPS=[1,3,7,16,35,80,180];
function srsInit(){return {step:-1,due:null,seen:0,lapses:0};}
function srsOnResult(st,allCorrect){
  st.seen+=1;
  if(allCorrect){ st.step=Math.min(st.step+1,STEPS.length-1);
    let idx=st.step;
    /* «пиявки»: слово с высокой долей ошибок (≥3 ошибок и >1/3 показов) держим
       в коротком цикле ≤16 дней, пока доля ошибок не разбавится успехами */
    if(st.lapses>=3&&st.lapses*3>st.seen) idx=Math.min(idx,3);
    st.due=new Date(Date.now()+STEPS[idx]*864e5).toISOString().slice(0,10);}
  else { st.lapses+=1; st.step=Math.max(-1,st.step-2); st.due=today(); }
  return st;}
function dueRanks(){
  const t=today(), out=[];
  for(const[r,st]of Object.entries(S.srs))
    if(st.due && st.due<=t) out.push(+r);
  return out;}

/* ---------- Контент из RTDB ---------- */
async function loadContent(){
  const cached=await kvGet('content');
  if(cached){S.wordbank=cached.wordbank; S.course=cached.course;
    S.phrases=cached.phrases||null; S.pcourse=cached.pcourse||null; index(); render(home);}
  try{
    const db=firebase.database();
    const [wb,co,ph,pc]=await Promise.all([db.ref('wordbank').get(), db.ref('course').get(),
      db.ref('phrases').get(), db.ref('pcourse').get()]);
    if(!wb.exists()||!co.exists()) throw new Error('нет данных в RTDB');
    const fresh={wordbank:wb.val(),course:co.val(),
      phrases:ph.exists()?ph.val():null, pcourse:pc.exists()?pc.val():null};
    const changed=!cached||JSON.stringify(cached.course.meta)!==JSON.stringify(fresh.course.meta)
      ||cached.wordbank.schema!==fresh.wordbank.schema
      ||JSON.stringify((cached.pcourse||{}).meta)!==JSON.stringify((fresh.pcourse||{}).meta);
    S.wordbank=fresh.wordbank; S.course=fresh.course;
    S.phrases=fresh.phrases; S.pcourse=fresh.pcourse; index();
    await kvSet('content',fresh);
    if(!cached){await migrateDone(); render(home);}
    else if(changed){const keep={};for(const k in S.doneLessons)if(k.slice(0,2)==='rb'||k.slice(0,2)==='gd')keep[k]=true;S.doneLessons=keep; await migrateDone(); UI.cat=null;
      toast('Контент обновлён'); render(home);}
  }catch(e){
    if(!cached){app.innerHTML=`<div class="wordcard">Не удалось загрузить контент: ${esc(e.message)}.
      <br><br>Проверь доступ (вход выполнен под ${esc(S.user?.email||'?')}).</div>
      <button class="btn ghost" onclick="firebase.auth().signOut().then(()=>location.reload())">Выйти</button>`;}
    else toast('Оффлайн: использую кэш');
  }
}

/* урок считается пройденным, если все его слова/фразы уже изучались (SRS) */
async function migrateDone(){
  let ch=false;
  for(const u of S.course.units)for(const l of u.lessons)
    if(!S.doneLessons[l.id]&&l.word_ranks.length&&
       l.word_ranks.every(r=>S.srs[r]&&S.srs[r].seen>0)){S.doneLessons[l.id]=true; ch=true;}
  if(S.pcourse)for(const lv of ['level2','level3'])for(const u of S.pcourse[lv]||[])
    for(const l of u.lessons)
      if(!S.doneLessons[l.id]&&l.phrase_ids.length&&
         l.phrase_ids.every(r=>S.srs[r]&&S.srs[r].seen>0)){S.doneLessons[l.id]=true; ch=true;}
  if(ch)await kvSet('doneLessons',S.doneLessons);
}
function index(){
  S.byRank={};
  for(const w of S.wordbank.words) S.byRank[w.freq_rank]=w;
  S.topicByRank={};
  if(S.course)for(const u of S.course.units)for(const w of u.words)
    S.topicByRank[w.freq_rank]=w.topic||u.topic||'';
  S.byPid={};
  if(S.phrases)for(const p of S.phrases.phrases) S.byPid[p.id]=p;
}

function render(fn,...a){window.scrollTo(0,0); fn(...a);}

function loginScreen(){
  app.innerHTML=`<div class="center" style="padding-top:12vh">
    ${marmot(150,'wave')}<h1>Кыргызча</h1>

  $('#login').onclick=async()=>{

const UNIT_COLORS=[['#58cc02','#46a302'],['#1cb0f6','#1899d6'],['#ce82ff','#a568cc'],
  ['#ff9600','#cc7800'],['#ff4b4b','#d33131'],['#2bc7c4','#22a09d']];

function goalRing(){
  const p=Math.min(1,S.doneToday/S.goal), C=2*Math.PI*10;
  return `<svg class="goalring" viewBox="0 0 26 26">
    <circle class="bgc" cx="13" cy="13" r="10"/>
    <circle class="fgc" cx="13" cy="13" r="10" stroke-dasharray="${C}"
      stroke-dashoffset="${C*(1-p)}"/></svg>`;
}

function firstUndone(){
  for(const u of S.course.units)
    for(const l of u.lessons)
      if(!S.doneLessons[l.id]) return {u,l};
  return null;
}

/* ---------- Навигация: уровни → категории → юниты → дорожка ---------- */
let UI={cat:null,unit:-1,lvl:1}; // cat=null → авто-раскрыть к текущему уроку; lvl: 1 слова / 2 фразы / 3 предложения
const CAT_ICONS={'Служебные слова':'🔗','Местоимения и указатели':'👉','Числа и количество':'🔢',
 'Время и календарь':'🕐','Общество и народ':'👥','Государство и политика':'🏢','Люди и семья':'👪',
 'Качества и свойства':'✨','Речь и информация':'💬','Место и география':'🌍',
 'Природа и окружающий мир':'🌿','Абстрактные понятия':'💭','Тело и здоровье':'💪',
 'Работа и дело':'💼','Безопасность и закон':'🚨','Действия и процессы':'🏃',
 'Общая лексика':'📚','Экономика и деньги':'💰','Образование и культура':'🎓',
 'Техника и транспорт':'🚗'};
function dnU(u){return u.lessons.filter(l=>S.doneLessons[l.id]).length;}
const PH_ICONS={'Приветствия и вежливость':'👋','Здоровье':'💪','Еда и магазин':'🛒','Время':'🕐',
 'Учёба и школа':'🎓','Семья':'👪','Работа':'💼','Город и транспорт':'🚌','Природа и страна':'🌄',
 'Досуг и спорт':'⚽','Действия':'🏃','Пословицы':'🪶','Общие фразы':'💬'};
function pUnits(){return UI.lvl===2?(S.pcourse&&S.pcourse.level2||[]):(S.pcourse&&S.pcourse.level3||[]);}
function firstUndoneP(){
  for(const u of pUnits())
    for(const l of u.lessons)
      if(!S.doneLessons[l.id]) return {u,l};
  return null;
}
function pPathHTML(u,nxt){
  const ci=(u.id-1)%UNIT_COLORS.length, [c,cd]=UNIT_COLORS[ci];
  let h=`<div class="path" style="--uc:${c};--ucd:${cd}">`;
  u.lessons.forEach((l,i)=>{
    const done=!!S.doneLessons[l.id];
    const cur=nxt&&nxt.l.id===l.id;
    const zig=['','zig-l','','zig-r',''][i%4]||'';
    h+=`<button class="node ${done?'done':''} ${cur?'cur':''} ${zig}" data-pl="${l.id}" data-pu="${u.id}">
      ${cur?'<span class="tip">НАЧАТЬ</span>':''}${done?'✓':(cur?'★':i+1)}</button>`;
  });
  return h+`</div>`;
}
function catGroups(){
  const gs=[],ix={};
  for(const u of S.course.units){
    const t=u.topic||u.title;
    if(!(t in ix)){ix[t]=gs.length; gs.push({t,units:[]});}
    gs[ix[t]].units.push(u);
  }
  return gs;
}
function pathHTML(u,nxt){
  const ci=(u.id-1)%UNIT_COLORS.length, [c,cd]=UNIT_COLORS[ci];
  let h=`<div class="path" style="--uc:${c};--ucd:${cd}">`;
  u.lessons.forEach((l,i)=>{
    const done=!!S.doneLessons[l.id];
    const cur=nxt&&nxt.l.id===l.id;
    const zig=['','zig-l','','zig-r',''][i%4]||'';
    h+=`<button class="node ${done?'done':''} ${cur?'cur':''} ${zig}" data-l="${l.id}" data-u="${u.id}">
      ${cur?'<span class="tip">НАЧАТЬ</span>':''}${done?'✓':(cur?'★':i+1)}</button>`;
  });
  return h+`</div>`;
}

function home(){
  const due=dueRanks().length;
  const lv=level();
  const nxt=firstUndone();
  const nxtP=UI.lvl>1?firstUndoneP():null;
  const cats=catGroups();
  if(UI.cat===null){
    UI.cat=0; UI.unit=0;
    if(UI.lvl===1&&nxt){
      const gi=S.course.units.findIndex(u=>u.id===nxt.u.id);
      UI.unit=Math.max(0,gi);
      UI.cat=Math.max(0,cats.findIndex(g=>g.units.some(u=>u.id===nxt.u.id)));
    }
    if(UI.lvl>1)UI.cat=nxtP?pUnits().findIndex(u=>u.id===nxtP.u.id):0;
  }
  const tips={
    streak:`🔥 Стрик: ${S.streak.count} ${dayWord(S.streak.count)} занятий подряд. Проходи хотя бы один урок в день, чтобы он рос. Пропуск дня без заморозки обнуляет стрик.`,
    frz:`❄️ Заморозки: ${S.streak.freezes} из 2. Если пропустишь день, одна заморозка сгорит вместо стрика. Запас восстанавливается до 2 за каждые 7 дней стрика.`,
    xp:`⚡ Опыт (XP): ${S.xp}. Даётся за уроки и повторения, бонус — за урок без ошибок. Уровень: ${lv.name}.${lv.next?` До «${lv.next[1]}» — ${lv.next[0]-S.xp} XP.`:''}`,
    goal:`🎯 Цель дня: пройдено ${S.doneToday} из ${S.goal}. Кольцо заполняется с каждым уроком. Изменить цель можно внизу страницы.`};
  let html=`
  <div class="statbar">
    <button class="stat streak-c" data-k="streak"><span class="ic">🔥</span>${S.streak.count}</button>
    <button class="stat frz-c" data-k="frz"><span class="ic">❄️</span>${S.streak.freezes}</button>
    <button class="stat xp-c" data-k="xp"><span class="ic">⚡</span>${S.xp}</button>

  </div>
  <div class="tipbox" id="tipbox" hidden></div>
  <div style="display:flex; align-items:center; gap:12px">
    ${marmot(56)}
    <div><h1 style="margin:0">Кыргызча</h1>
    <div class="lvl" id="lvlbtn">${esc(lv.name)}${lv.next?` · до «${esc(lv.next[1])}» ${lv.next[0]-S.xp} XP`:''} <span style="opacity:.55">ⓘ</span></div></div>
  </div>`;
  const hasPh=!!(S.pcourse&&S.phrases);
  if(hasPh) html+=`<div class="lvltabs">

/* ---------- Генерация упражнений ---------- */
/* пересечение переводов: если у кандидата и цели есть общий значимый токен
   (или общий корень длинных слов), оба варианта могут быть «верными» — исключаем */
function trTokens(w){return shortTr(w).toLowerCase().split(/[^а-яёa-z]+/i)
  .filter(t=>t.length>=3);}
function similarMeaning(a,b){
  const A=trTokens(a),B=trTokens(b);
  return A.some(x=>B.some(y=>x===y||(x.length>=5&&y.length>=5&&x.slice(0,4)===y.slice(0,4))));}

function distractors(word,n,field){
  /* принципы (best practices MCQ-дистракторов):
     1) близки к ответу по длине/числу слов — верный вариант не выделяется визуально;
     2) ≥1 из той же темы — семантическая близость полезнее случайных слов;
     3) слова, которые раньше путались с этим (S.confus), приходят чаще — adaptive;
     4) кандидаты с пересекающимся переводом исключены — не бывает двух верных;
     5) ≥1 уже изученное слово — скрытое повторение.
     Возвращает [{v,r}] — текст и freq_rank (rank нужен для учёта путаницы). */
  const ansV=field==='word'?word.word:shortTr(word);
  const topic=S.topicByRank[word.freq_rank]||'';
  const conf=S.confus[word.freq_rank]||{};
  const used=new Set([ansV]);
  const cand=[];
  for(const w of S.wordbank.words){
    if(w.freq_rank===word.freq_rank)continue;
    const v=field==='word'?w.word:shortTr(w);
    if(used.has(v))continue;
    if(similarMeaning(w,word))continue;
    used.add(v);
    const dLen=Math.abs(v.length-ansV.length);
    const dWords=Math.abs(v.split(/\s+/).length-ansV.split(/\s+/).length);
    const seen=!!(S.srs[w.freq_rank]&&S.srs[w.freq_rank].seen>0);
    const same=!!topic&&S.topicByRank[w.freq_rank]===topic;
    const cf=Math.min(conf[w.freq_rank]||0,3);
    cand.push({v,r:w.freq_rank,seen,same,
      score:dLen+dWords*6-(same?7:0)-cf*8+Math.random()*4});
  }
  cand.sort((a,b)=>a.score-b.score);
  const out=cand.slice(0,n);
  /* гарантия: ≥1 из той же темы (если тема есть и кандидаты нашлись) */
  if(out.length>=2&&!out.some(c=>c.same)){
    const c=cand.find(x=>x.same&&!out.includes(x));
    if(c)out[out.length-1]=c;
  }
  /* гарантия: ≥1 уже изученное (не затирая единственный тематический слот) */
  if(out.length&&!out.some(c=>c.seen)){
    const c=cand.find(x=>x.seen&&!out.includes(x));
    if(c){let i=out.findIndex(o=>!o.same); if(i<0)i=0; out[i]=c;}
  }
  return out.map(c=>({v:c.v,r:c.r}));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];}return a;}

function buildTasks(ranks,withIntro){
  const tasks=[];
  if(withIntro){
    for(const r of ranks){ if(!S.byRank[r])continue;
      if(!S.srs[r])tasks.push({type:'intro',r});
      tasks.push({type:'ky2ru',r});
    }
  } else {
    for(const r of ranks)if(S.byRank[r])tasks.push({type:'ky2ru',r});
  }
  const mr=ranks.filter(r=>S.byRank[r]);
  if(mr.length>=3)tasks.push({type:'match',ranks:mr.slice(0,5)});
  if(!S.mute)for(const r of shuffle([...ranks]))if(S.byRank[r])tasks.push({type:'lis',r});
  for(const r of shuffle([...ranks]))if(S.byRank[r])tasks.push({type:'ru2ky',r});
  for(const r of ranks)if(S.byRank[r])tasks.push({type:'type',r});
  return tasks;}

/* ---------- Фразы: дистракторы и задания ---------- */
function pdistract(ph,n){
  /* переводы других фраз: тот же уровень, приоритет — та же тема, близкая длина */
  const conf=S.confus[ph.id]||{};
  const cand=[];
  for(const p of S.phrases.phrases){
    if(p.id===ph.id||p.ru===ph.ru)continue;
    if(similarMeaning({translation:p.ru},{translation:ph.ru}))continue;
    const dLen=Math.abs(p.ru.length-ph.ru.length);
    const same=p.topic===ph.topic&&p.level===ph.level;
    const cf=Math.min(conf[p.id]||0,3);
    cand.push({v:p.ru,r:p.id,same,score:dLen*0.5-(same?8:0)-cf*8+Math.random()*4});
  }
  cand.sort((a,b)=>a.score-b.score);
  const out=cand.slice(0,n);
  if(out.length>=2&&!out.some(c=>c.same)){
    const c=cand.find(x=>x.same&&!out.includes(x));
    if(c)out[out.length-1]=c;
  }
  return out.map(c=>({v:c.v,r:c.r}));
}
function pTiles(ph){
  /* плитки: слова фразы + 2-3 ложных из фраз той же темы (без пунктуации, без дублей) */
  const clean=w=>w.replace(/[.,!?«»:;]/g,'');
  const words=ph.ky.split(' ');
  const wset=new Set(words.map(w=>clean(w).toLowerCase()));
  const decoyPool=[];
  for(const p of S.phrases.phrases){
    if(p.id===ph.id||p.topic!==ph.topic)continue;
    for(let w of p.ky.split(' ')){
      w=clean(w);
      if(w.length>1&&!wset.has(w.toLowerCase()))decoyPool.push(w);
    }
  }
  const decoys=shuffle([...new Set(decoyPool)]).slice(0,Math.min(3,Math.max(2,Math.floor(words.length/2))));
  return {words,tiles:shuffle([...words,...decoys])};
}
function buildPTasks(pids,withIntro){
  const tasks=[];
  for(const id of pids){ if(!S.byPid[id])continue;
    if(withIntro&&!S.srs[id])tasks.push({type:'pintro',r:id});
    tasks.push({type:'pky2ru',r:id});
  }
  if(!S.mute)for(const id of shuffle([...pids]))if(S.byPid[id])tasks.push({type:'plis',r:id});
  for(const id of shuffle([...pids]))if(S.byPid[id]){
    const ph=S.byPid[id];
    if(ph.ky.split(' ').length<=9)tasks.push({type:'pbuild',r:id});
    else tasks.push({type:'pky2ru',r:id});
  }
  return tasks;
}

/* ---------- Мои слова ---------- */
const WFILT=[['all','Все'],['learn','Учу'],['know','Знаю'],['hard','Сложные']];
function wCat(st){
  if((st.lapses||0)>=3&&st.lapses*3>st.seen)return 'hard';
  return st.step>=4?'know':'learn';}
function myWordsData(){
  const out={w:[],p:[]};
  for(const[k,st]of Object.entries(S.srs)){
    if(!st||!(st.seen>0))continue;
    const r=+k;
    if(r<PID0){const w=S.byRank[r];
      if(w)out.w.push({r,st,ky:w.word,ru:w.translation||'',topic:S.topicByRank[r]||w.topic||''});}
    else{const p=S.byPid[r];
      if(p)out.p.push({r,st,ky:p.ky,ru:p.ru||'',topic:''});}
  }
  const coll=(a,b)=>a.ky.localeCompare(b.ky,'ru');
  out.w.sort(coll); out.p.sort(coll);
  return out;}
function wordsScreen(){

  const acc=(sess&&sess.ans)?Math.round(100*sess.ok/sess.ans):(total?Math.round(100*correct/total):100);

function dayWord(n){const m=n%10,h=n%100;
  if(h>=11&&h<=14)return 'дней'; if(m===1)return 'день'; if(m>=2&&m<=4)return 'дня'; return 'дней';}

/* ---------- Сессия ---------- */
function runSession(tasks,onDone){
  prefetchAudio([...new Set(tasks.flatMap(t=>t.ranks||(t.r?[t.r]:[])))]);
  const queue=[...tasks];
  const errors={}, sess={ans:0,ok:0};
  let total=queue.length, done=0, combo=0;
  const PRAISE=['Отлично!','Верно!','Азамат!','Точно!','Супер!','Мыкты!'];

  function head(){
    app.innerHTML=`<div class="topbar">
      <button class="xbtn" id="close">✕</button>
      <div class="bar"><div id="pbar" style="width:${100*done/total}%"></div></div>
      <span class="combo" id="combo">${combo>=2?'🔥'+combo:''}</span></div>
      <div id="ex" class="padfb"></div>`;
    $('#close').onclick=()=>{if(confirm('Выйти из урока? Прогресс урока не сохранится.'))render(home);};
  }
  function bump(){const p=$('#pbar'); if(p)p.style.width=`${100*done/total}%`;
    const c=$('#combo'); if(c)c.textContent=combo>=2?'🔥'+combo:'';}

  function feedback(ok,detail,onNext){
    const old=document.querySelector('.fb'); if(old)old.remove();
    const el=document.createElement('div');
    el.className='fb '+(ok?'ok':'bad');
    el.innerHTML=`<div class="in" style="display:flex; gap:14px; align-items:flex-start">
      <div style="flex-shrink:0; margin-top:2px">${marmot(52, ok?'happy':'sad')}</div>
      <div style="flex:1"><div class="t">${ok?PRAISE[Math.floor(Math.random()*PRAISE.length)]:'Не совсем…'}</div>
      ${detail?`<div class="d">${detail}</div>`:''}
      <button class="btn ${ok?'':'red'}" id="fnext">Дальше</button></div></div>`;
    const host=$('#ex')||document.body;
    host.appendChild(el);
    requestAnimationFrame(()=>el.scrollIntoView({block:'nearest',behavior:'smooth'}));
    $('#fnext').onclick=()=>{el.remove(); onNext();};
  }

  function finishTask(ok,detail){
    done+=1; sess.ans+=1; if(ok)sess.ok+=1;
    if(ok){combo+=1;} else {combo=0;
      errors[curR()]=(errors[curR()]||0)+1; total+=1; queue.push(queue[0]);}
    bump();
    feedback(ok,detail,()=>{queue.shift(); next();});
  }
  function curR(){return queue[0].r;}

  function next(){
    if(!queue.length){onDone(errors,sess);return;}
    head();
    const t=queue[0];
    const ex=$('#ex');

    /* -- match -- */
    if(t.type==='match'){
      const pairs=t.ranks.map(r=>S.byRank[r]);
      let sel=null, left=pairs.length, err=0;
      const ky=shuffle(pairs.map(w=>({k:w.freq_rank,txt:w.word})));
      const ru=shuffle(pairs.map(w=>({k:w.freq_rank,txt:shortTr(w)})));
      ex.innerHTML=`<p class="prompt">Соедини пары</p><div class="match">
        ${ky.map(o=>`<button class="mbtn" data-k="${o.k}" data-s="ky">${esc(o.txt)}</button>`).join('')}
        ${ru.map(o=>`<button class="mbtn" data-k="${o.k}" data-s="ru">${esc(o.txt)}</button>`).join('')}
      </div>`;
      document.querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>{
        if(b.classList.contains('done'))return;
        if(sel===b){b.classList.remove('sel');sel=null;return;}
        if(!sel||sel.dataset.s===b.dataset.s){
          if(sel)sel.classList.remove('sel');
          sel=b; b.classList.add('sel'); return;}
        if(sel.dataset.k===b.dataset.k){
          playAudio(+b.dataset.k);
          sel.classList.remove('sel'); sel.classList.add('done'); b.classList.add('done');
          sel=null; left-=1;
          if(!left){
            done+=1; sess.ans+=1; if(err===0){sess.ok+=1; combo+=1;}else combo=0; bump();
            feedback(err===0,null,()=>{queue.shift(); next();});
          }
        } else {
          err+=1;
          sel.classList.add('err'); b.classList.add('err');
          const a=sel; sel=null;
          setTimeout(()=>{a.classList.remove('err','sel');b.classList.remove('err');},450);
        }
      });
      return;

    /* -- фразы -- */

        return;
      }
      if(t.type==='pky2ru'){
        const opts=shuffle([{v:ph.ru,r:ph.id},...pdistract(ph,3)]);
        playAudio(ph.id);
        ex.innerHTML=`<p class="prompt">Выбери перевод</p>
          <div class="ruword" style="font-size:22px">${esc(ph.ky)} <span class="spk" data-spk="${ph.id}">🔊</span></div>
          ${opts.map(o=>`<button class="opt" data-r="${o.r}">${esc(o.v)}</button>`).join('')}`;
        document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
          const ok=+b.dataset.r===ph.id;
          b.classList.add(ok?'ok':'bad');
          if(ok)b.classList.add('pop');
          if(!ok){
            document.querySelectorAll('.opt').forEach(x=>{
              if(+x.dataset.r===ph.id)x.classList.add('ok');});
            const cr=+b.dataset.r;
            if(cr){const m=S.confus[t.r]=S.confus[t.r]||{};
              m[cr]=(m[cr]||0)+1; kvSet('confus',S.confus);}
          }
          document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
          finishTask(ok, ok?null:`${esc(ph.ky)} — ${esc(ph.ru)}`);});
        return;
      }
      if(t.type==='plis'){
        playAudio(ph.id);
        const opts=shuffle([{v:ph.ru,r:ph.id},...pdistract(ph,3)]);
        ex.innerHTML=`<p class="prompt">${S.mute?'Что это значит?':'Что ты услышал?'}</p>
          <div class="center">${S.mute?`<div class="kyword" style="font-size:22px">${esc(ph.ky)}</div>`:`<span class="lisbtn" data-spk="${ph.id}">🔊</span>`}</div>
          ${opts.map(o=>`<button class="opt" data-r="${o.r}">${esc(o.v)}</button>`).join('')}`;
        document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
          const ok=+b.dataset.r===ph.id;
          b.classList.add(ok?'ok':'bad');
          if(ok)b.classList.add('pop');
          if(!ok){
            document.querySelectorAll('.opt').forEach(x=>{if(+x.dataset.r===ph.id)x.classList.add('ok');});
            const cr=+b.dataset.r;
            if(cr){const m=S.confus[t.r]=S.confus[t.r]||{};m[cr]=(m[cr]||0)+1;kvSet('confus',S.confus);}
          }
          document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
          finishTask(ok,`<b>${esc(ph.ky)}</b> — ${esc(ph.ru)}`);});
        return;
      }
      /* pbuild: собери фразу из плиток */
      const {words,tiles}=pTiles(ph);
      const picked=[];
      ex.innerHTML=`<p class="prompt">Собери фразу по-кыргызски</p>
        <div class="ruword">${esc(ph.ru)}</div>
        <div class="answer" id="ans"></div>

          `<button class="tile" data-i="${i}">${esc(w)}</button>`).join('')}</div>
        <button class="btn" id="check" disabled>Проверить</button>`;
      const redraw=()=>{
        $('#ans').innerHTML=picked.map(i=>
          `<button class="tile" data-p="${i}">${esc(tiles[i])}</button>`).join('');
        document.querySelectorAll('#tiles .tile').forEach(b=>
          b.classList.toggle('used',picked.includes(+b.dataset.i)));
        $('#check').disabled=picked.length===0;
        document.querySelectorAll('#ans .tile').forEach(b=>b.onclick=()=>{
          picked.splice(picked.indexOf(+b.dataset.p),1); redraw();});
      };
      document.querySelectorAll('#tiles .tile').forEach(b=>b.onclick=()=>{
        if(!picked.includes(+b.dataset.i)){picked.push(+b.dataset.i); redraw();}});
      $('#check').onclick=()=>{
        const got=picked.map(i=>tiles[i]).join(' ');
        const norm=s=>s.toLowerCase().replace(/[.,!?«»]/g,'').replace(/\s+/g,' ').trim();
        const ok=norm(got)===norm(ph.ky);
        playAudio(ph.id);
        $('#check').disabled=true;
        document.querySelectorAll('.tile').forEach(x=>x.disabled=true);
        finishTask(ok, ok?null:`Правильно: <b>${esc(ph.ky)}</b>`);};

    const w=S.byRank[t.r];

      const opts=shuffle([{v:shortTr(w),r:w.freq_rank},...distractors(w,3,'tr')]);

          document.querySelectorAll('.opt').forEach(x=>{if(+x.dataset.r===w.freq_rank)x.classList.add('ok');});
          const cr=+b.dataset.r;
          if(cr){const m=S.confus[t.r]=S.confus[t.r]||{};m[cr]=(m[cr]||0)+1;kvSet('confus',S.confus);}
        }
        document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        finishTask(ok,`<b>${esc(w.word)}</b> — ${esc(shortTr(w))}`);});
      return;
    }

    /* -- intro -- */
    if(t.type==='intro'){
      errors[t.r]=errors[t.r]||0;
      playAudio(w.freq_rank);
      ex.innerHTML=`<p class="prompt">Новое слово</p>
        <div class="wordcard">
        <div class="kyword">${esc(w.word)} <span class="spk" data-spk="${w.freq_rank}">🔊</span></div>
        <div class="tr">${esc(w.translation)}</div>
        ${w.translation2?`<div class="also">также: ${esc(w.translation2)}</div>`:''}
        ${findTopic(t.r)?`<div><span class="topic-pill">${esc(findTopic(t.r))}</span></div>`:''}</div>
        <button class="btn" id="ok">Понятно</button>`;
      $('#ok').onclick=()=>{done+=1;bump();queue.shift();next();};
      return;
    }

    /* -- выбор варианта -- */
    if(t.type==='ky2ru'||t.type==='ru2ky'){
      const q=t.type==='ky2ru'?w.word:shortTr(w);
      const ans=t.type==='ky2ru'?shortTr(w):w.word;
      const field=t.type==='ky2ru'?'tr':'word';
      const opts=shuffle([{v:ans,r:w.freq_rank},...distractors(w,3,field==='word'?'word':'tr')]);
      ex.innerHTML=`<p class="prompt">${t.type==='ky2ru'?'Выбери перевод':'Выбери кыргызское слово'}</p>
        <div class="${t.type==='ky2ru'?'kyword':'ruword'}">${esc(q)}${t.type==='ky2ru'?` <span class="spk" data-spk="${w.freq_rank}">🔊</span>`:''}</div>
        ${opts.map(o=>`<button class="opt" data-r="${o.r}">${esc(o.v)}</button>`).join('')}`;
      if(t.type==='ky2ru')playAudio(w.freq_rank);
      document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
        const ok=+b.dataset.r===w.freq_rank;

        if(!ok){
          document.querySelectorAll('.opt').forEach(x=>{
            if(+x.dataset.r===w.freq_rank)x.classList.add('ok');});
          /* запомнить, с чем перепутал — это слово будет чаще приходить дистрактором */
          const cr=+b.dataset.r;
          if(cr){const m=S.confus[t.r]=S.confus[t.r]||{};
            m[cr]=(m[cr]||0)+1; kvSet('confus',S.confus);}
        }
        document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        if(t.type==='ru2ky')playAudio(w.freq_rank);
        finishTask(ok, ok?null:`${esc(w.word)} — ${esc(shortTr(w))}`);});
      return;
    }

    /* -- набор текста -- */
    if(t.type==='type'){
      ex.innerHTML=`<p class="prompt">Напиши по-кыргызски</p>
        <div class="ruword">${esc(shortTr(w))}</div>
        <input type="text" id="inp" autocomplete="off" autocapitalize="off" lang="ky">

          `<button data-c="${c}">${c}</button>`).join('')}</div>
        <button class="btn" id="check">Проверить</button>`;
      const inp=$('#inp'); inp.focus();
      document.querySelectorAll('.kyletters button').forEach(b=>b.onclick=()=>{
        const s=inp.selectionStart||inp.value.length;
        inp.value=inp.value.slice(0,s)+b.dataset.c+inp.value.slice(s);
        inp.focus(); inp.selectionStart=inp.selectionEnd=s+1;});
      const check=()=>{
        if(!inp.value.trim())return;

        const ok=norm(inp.value)===norm(w.word);
        playAudio(w.freq_rank);
        $('#check').disabled=true; inp.disabled=true;
        finishTask(ok, ok?null:`Правильно: <b>${esc(w.word)}</b>`);};
      $('#check').onclick=check;
      inp.onkeydown=e=>{if(e.key==='Enter'&&!$('#check').disabled)check();};
      return;
    }
  }
  next();
}

/* ---------- Конфетти ---------- */
function confetti(){
  const cv=$('#confetti'), ctx=cv.getContext('2d');
  cv.width=innerWidth; cv.height=innerHeight;
  const cols=['#58cc02','#1cb0f6','#ffc400','#ff4b4b','#ce82ff'];
  const ps=Array.from({length:80},()=>({
    x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.5,
    vx:(Math.random()-0.5)*3, vy:2+Math.random()*4,
    s:5+Math.random()*6, c:cols[Math.floor(Math.random()*cols.length)],
    a:Math.random()*Math.PI, va:(Math.random()-0.5)*0.3}));
  let frames=0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(const p of ps){
      p.x+=p.vx; p.y+=p.vy; p.a+=p.va;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); ctx.restore();
    }
    if(++frames<130)requestAnimationFrame(tick);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ---------- Sync прогресса: local-first, RTDB progress/<uid> ---------- */
/* Ключи srs/confus числовые -> префикс 'r', иначе RTDB превратит объект в гигантский массив */
function encProg(){
  const srs={},conf={};
  for(const[k,v]of Object.entries(S.srs))srs['r'+k]=v;
  for(const[k,v]of Object.entries(S.confus)){
    const o={};for(const[k2,c]of Object.entries(v))o['r'+k2]=c;conf['r'+k]=o;}
  return {updated:Date.now(),xp:S.xp,goal:S.goal,streak:S.streak,settings:S.settings||null,
    doneToday:{d:today(),n:S.doneToday},doneLessons:S.doneLessons,srs,confus:conf};
}
let syncBusy=false;
async function syncPush(){
  if(!S.user||syncBusy)return;
  syncBusy=true;
  try{await firebase.database().ref('progress/'+S.user.uid).set(encProg());}
  catch(e){/* оффлайн — локальный прогресс главный, дольёмся позже */}
  syncBusy=false;
}
async function syncPull(){
  if(!S.user)return;
  try{
    const snap=await firebase.database().ref('progress/'+S.user.uid).get();
    if(!snap.exists()){await syncPush();return;}
    const R=snap.val(); let ch=false;
    /* SRS: на каждый ключ берём запись с бОльшим seen (при равных — более поздний due) */
    for(const[rk,v]of Object.entries(R.srs||{})){
      const k=rk.slice(1), l=S.srs[k];
      if(!l||v.seen>l.seen||(v.seen===l.seen&&(v.due||'')>(l.due||''))){
        if(!l||JSON.stringify(l)!==JSON.stringify(v)){S.srs[k]=v; await kvSet(k,v,'srs'); ch=true;}
      }
    }
    if((R.xp||0)>S.xp){S.xp=R.xp; await kvSet('xp',S.xp); ch=true;}
    const rs=R.streak;
    if(rs&&rs.last&&(!S.streak.last||rs.last>S.streak.last||
       (rs.last===S.streak.last&&rs.count>S.streak.count))){
      S.streak=rs; await kvSet('streak',S.streak); ch=true;}
    const rdt=R.doneToday;
    if(rdt&&rdt.d===today()&&rdt.n>S.doneToday){
      S.doneToday=rdt.n; await kvSet('doneToday',{d:today(),n:S.doneToday}); ch=true;}
    let dlCh=false;
    for(const k of Object.keys(R.doneLessons||{}))
      if(!S.doneLessons[k]){S.doneLessons[k]=true; dlCh=true;}
    if(dlCh){await kvSet('doneLessons',S.doneLessons); ch=true;}
    let cfCh=false;
    for(const[rk,o]of Object.entries(R.confus||{})){
      const k=rk.slice(1); S.confus[k]=S.confus[k]||{};
      for(const[rk2,c]of Object.entries(o||{})){
        const k2=rk2.slice(1);
        if((S.confus[k][k2]||0)<c){S.confus[k][k2]=c; cfCh=true;}
      }
    }
    if(cfCh){await kvSet('confus',S.confus); ch=true;}
    if(R.settings&&!S.settings){S.settings=R.settings; await kvSet('settings',S.settings); ch=true;}
    if(ch)toast('☁️ Прогресс синхронизирован');
    await syncPush(); // записываем результат слияния
  }catch(e){/* оффлайн — работаем локально */}
}
