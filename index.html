<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Кыргызча</title>
<meta name="theme-color" content="#c8102e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --red:#c8102e; --red-dark:#a00d25; --yellow:#ffcc00;
  --bg:#f7f7f9; --card:#fff; --text:#222; --muted:#888;
  --green:#2e9e44; --green-bg:#e6f6ea; --wrong:#d33; --wrong-bg:#fdeaea;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;}
#app{max-width:520px; margin:0 auto; padding:12px 14px 90px}
h1{font-size:22px; margin:10px 0}
h2{font-size:18px; margin:14px 0 8px}
.card{background:var(--card); border-radius:var(--radius); padding:14px;
  margin:10px 0; box-shadow:0 1px 3px rgba(0,0,0,.07)}
button{font:inherit; border:0; border-radius:var(--radius); cursor:pointer}
.btn{display:block; width:100%; padding:14px; font-size:17px; font-weight:600;
  background:var(--red); color:#fff; margin:8px 0}
.btn:active{background:var(--red-dark)}
.btn.sec{background:#eceef2; color:var(--text)}
.btn:disabled{opacity:.45}
.opt{display:block; width:100%; text-align:left; padding:13px 14px; font-size:16px;
  background:var(--card); border:2px solid #e3e5ea; border-radius:var(--radius); margin:7px 0}
.opt.sel{border-color:var(--red)}
.opt.ok{border-color:var(--green); background:var(--green-bg)}
.opt.bad{border-color:var(--wrong); background:var(--wrong-bg)}
.topbar{display:flex; align-items:center; gap:10px; padding:6px 0}
.topbar .stat{font-weight:700; font-size:15px}
.bar{flex:1; height:12px; background:#e3e5ea; border-radius:6px; overflow:hidden}
.bar>div{height:100%; background:var(--green); width:0; transition:width .25s}
.kyword{font-size:30px; font-weight:800; margin:16px 0 4px; word-break:break-word}
.ruword{font-size:19px; margin:12px 0; word-break:break-word}
.hint{color:var(--muted); font-size:13px}
.flag{color:#b8860b; font-size:12px}
input[type=text]{width:100%; padding:13px; font-size:18px; border:2px solid #e3e5ea;
  border-radius:var(--radius); background:var(--card)}
input[type=text]:focus{outline:none; border-color:var(--red)}
.kyletters{display:flex; gap:8px; margin:8px 0}
.kyletters button{flex:1; padding:10px; font-size:18px; background:#eceef2; border-radius:10px}
.feedback{padding:12px 14px; border-radius:var(--radius); margin:10px 0; font-weight:600}
.feedback.ok{background:var(--green-bg); color:var(--green)}
.feedback.bad{background:var(--wrong-bg); color:var(--wrong)}
.unit{margin:10px 0}
.unit .uhead{display:flex; justify-content:space-between; align-items:center;
  padding:13px 14px; background:var(--card); border-radius:var(--radius); cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.07)}
.unit .uhead .t{font-weight:700; font-size:15px}
.lessons{display:flex; gap:8px; padding:10px 2px}
.lesson-b{flex:1; padding:12px 6px; text-align:center; border-radius:var(--radius);
  background:var(--card); border:2px solid #e3e5ea; font-weight:700}
.lesson-b.done{border-color:var(--green); background:var(--green-bg)}
.pill{font-size:12px; background:#eceef2; border-radius:999px; padding:3px 9px; color:var(--muted)}
.row{display:flex; gap:10px; align-items:center}
.grow{flex:1}
.center{text-align:center}
.big{font-size:44px}
.statgrid{display:flex; gap:10px}
.statgrid .card{flex:1; text-align:center; margin:0}
.statgrid .v{font-size:22px; font-weight:800}
.statgrid .l{font-size:12px; color:var(--muted)}
#toast{position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  background:#333; color:#fff; padding:10px 18px; border-radius:999px; font-size:14px;
  opacity:0; transition:opacity .3s; pointer-events:none; z-index:50}
.hidden{display:none}
a{color:var(--red)}
</style>
</head>
<body>
<div id="app"><div class="center" style="padding-top:30vh"><div class="big">🇰🇬</div>Загрузка…</div></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ============ Кыргызча v0.1 — оболочка без контента.
   Весь словарь/курс приходит из Firebase RTDB после входа. ============ */
'use strict';

const firebaseConfig = {
  apiKey: "AIzaSyAt9StrSkg4cxpvI-d5SmPba-nMiPXsEa8",
  authDomain: "ky-app-9c14d.firebaseapp.com",
  databaseURL: "https://ky-app-9c14d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ky-app-9c14d",
  storageBucket: "ky-app-9c14d.firebasestorage.app",
  messagingSenderId: "576618146726",
  appId: "1:576618146726:web:c30d90621278208f80bd67"
};
firebase.initializeApp(firebaseConfig);

/* ---------- IndexedDB (локальный прогресс, v0.1 — без синка) ---------- */
const DB_NAME='kyapp', DB_VER=1;
let idb;
function idbOpen(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=()=>{const d=r.result;
    if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');
    if(!d.objectStoreNames.contains('srs'))d.createObjectStore('srs');};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
function kvGet(k,store='kv'){return new Promise((res,rej)=>{
  const t=idb.transaction(store).objectStore(store).get(k);
  t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);});}
function kvSet(k,v,store='kv'){return new Promise((res,rej)=>{
  const t=idb.transaction(store,'readwrite').objectStore(store).put(v,k);
  t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);});}
function srsAll(){return new Promise((res,rej)=>{
  const out={}; const c=idb.transaction('srs').objectStore('srs').openCursor();
  c.onsuccess=()=>{const cur=c.result; if(cur){out[cur.key]=cur.value;cur.continue();}else res(out);};
  c.onerror=()=>rej(c.error);});}

/* ---------- Состояние ---------- */
let S={user:null, wordbank:null, course:null, byRank:{}, srs:{},
  streak:{count:0,last:null,freezes:2}, xp:0, goal:1, doneToday:0, doneLessons:{}};

const $=s=>document.querySelector(s);
const app=$('#app');
function toast(m){const t=$('#toast');t.textContent=m;t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2200);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function today(){return new Date().toISOString().slice(0,10);}
function shortTr(w){ // первая часть словарного перевода, до ~55 символов
  let t=(w.translation||'').split('||')[0].split(';')[0].trim();
  if(t.length>55){t=t.slice(0,55).replace(/[,\s]+\S*$/,'')+'…';}
  return t||w.translation;}

/* ---------- Стрик / цель ---------- */
async function loadMeta(){
  S.streak=await kvGet('streak')||{count:0,last:null,freezes:2};
  S.xp=await kvGet('xp')||0;
  S.goal=await kvGet('goal')||1;
  S.doneLessons=await kvGet('doneLessons')||{};
  const dt=await kvGet('doneToday')||{d:null,n:0};
  S.doneToday=(dt.d===today())?dt.n:0;
  // применить заморозки за пропущенные дни
  const st=S.streak;
  if(st.last && st.last!==today()){
    const missed=Math.floor((new Date(today())-new Date(st.last))/864e5)-1;
    if(missed>0){
      if(missed<=st.freezes){st.freezes-=missed; toast(`❄️ Заморозка спасла стрик (осталось ${st.freezes})`);}
      else {st.count=0; st.freezes=2;}
      st.last=new Date(Date.now()-864e5).toISOString().slice(0,10);
      await kvSet('streak',st);
    }
  }
}
async function registerActivity(){
  const st=S.streak;
  if(st.last!==today()){
    st.count+=1; st.last=today();
    if(st.count%7===0 && st.freezes<2) st.freezes=2; // раз в неделю пополняем
    await kvSet('streak',st);
    toast(`🔥 Стрик: ${st.count}`);
  }
  S.doneToday+=1;
  await kvSet('doneToday',{d:today(),n:S.doneToday});
}

/* ---------- SM-2-lite ---------- */
const STEPS=[1,3,7,16,35,80,180]; // дни
function srsInit(){return {step:-1,due:null,seen:0,lapses:0};}
function srsOnResult(st,allCorrect){
  st.seen+=1;
  if(allCorrect){ st.step=Math.min(st.step+1,STEPS.length-1);
    st.due=new Date(Date.now()+STEPS[st.step]*864e5).toISOString().slice(0,10);}
  else { st.lapses+=1; st.step=Math.max(-1,st.step-2);
    st.due=today(); } // ошибся — вернётся сегодня/сразу
  return st;}
function dueRanks(){
  const t=today(), out=[];
  for(const[r,st]of Object.entries(S.srs))
    if(st.due && st.due<=t) out.push(+r);
  return out;}

/* ---------- Контент из RTDB (кэш в IndexedDB) ---------- */
async function loadContent(){
  const cached=await kvGet('content');
  if(cached){S.wordbank=cached.wordbank; S.course=cached.course; index(); render(home);}
  try{
    const db=firebase.database();
    const [wb,co]=await Promise.all([
      db.ref('wordbank').get(), db.ref('course').get()]);
    if(!wb.exists()||!co.exists()) throw new Error('нет данных в RTDB');
    S.wordbank=wb.val(); S.course=co.val(); index();
    await kvSet('content',{wordbank:S.wordbank,course:S.course});
    if(!cached) render(home);
  }catch(e){
    if(!cached){app.innerHTML=`<div class="card">Не удалось загрузить контент: ${esc(e.message)}.
      <br><br>Проверь доступ (вход выполнен под ${esc(S.user?.email||'?')}).</div>
      <button class="btn sec" onclick="firebase.auth().signOut().then(()=>location.reload())">Выйти</button>`;}
    else toast('Оффлайн: использую кэш');
  }
}
function index(){
  S.byRank={};
  for(const w of S.wordbank.words) S.byRank[w.freq_rank]=w;
}

/* ---------- Экраны ---------- */
function render(fn,...a){window.scrollTo(0,0); fn(...a);}

function loginScreen(){
  app.innerHTML=`<div class="center" style="padding-top:18vh">
    <div class="big">🇰🇬</div><h1>Кыргызча</h1>
    <p class="hint">Личное приложение Ивана для изучения кыргызского</p>
    <button class="btn" id="login">Войти через Google</button></div>`;
  $('#login').onclick=async()=>{
    const p=new firebase.auth.GoogleAuthProvider();
    try{await firebase.auth().signInWithPopup(p);}
    catch(e){ try{await firebase.auth().signInWithRedirect(p);}
      catch(e2){toast('Ошибка входа: '+e2.code);} }
  };
}

function home(){
  const due=dueRanks().length;
  const units=S.course.units;
  const goalDone=S.doneToday>=S.goal;
  let html=`
  <div class="row"><h1 class="grow">Кыргызча</h1>
    <span class="pill">${esc(S.user.email.split('@')[0])}</span></div>
  <div class="statgrid">
    <div class="card"><div class="v">🔥 ${S.streak.count}</div><div class="l">стрик (❄️ ${S.streak.freezes})</div></div>
    <div class="card"><div class="v">⭐ ${S.xp}</div><div class="l">XP</div></div>
    <div class="card"><div class="v">${goalDone?'✅':''} ${S.doneToday}/${S.goal}</div><div class="l">цель дня</div></div>
  </div>`;
  if(due>0) html+=`<button class="btn" id="review">Повторение — ${due} слов</button>`;
  html+=`<h2>Курс · 50 юнитов</h2>`;
  for(const u of units){
    const done=[1,2,3].filter(i=>S.doneLessons[`u${u.id}-l${i}`]).length;
    html+=`<div class="unit" data-u="${u.id}">
      <div class="uhead"><span class="t">${u.id}. ${esc(u.title)}</span>
        <span class="pill">${done}/3</span></div>
      <div class="lessons hidden">
        ${u.lessons.map((l,i)=>`<button class="lesson-b ${S.doneLessons[l.id]?'done':''}"
          data-l="${l.id}" data-u="${u.id}">Урок ${i+1}</button>`).join('')}
      </div></div>`;
  }
  html+=`<div class="card hint">Темы юнитов размечены ИИ (не проверены носителем).
    Слова с пометкой ⚠ требуют проверки носителем.
    <br><br>Цель дня: <select id="goal">${[1,2,3,4,5].map(n=>
      `<option ${n===S.goal?'selected':''}>${n}</option>`).join('')}</select> урок(а)
    · <a href="#" id="logout">выйти</a></div>`;
  app.innerHTML=html;
  document.querySelectorAll('.uhead').forEach(el=>el.onclick=()=>
    el.nextElementSibling.classList.toggle('hidden'));
  document.querySelectorAll('.lesson-b').forEach(b=>b.onclick=()=>{
    const u=S.course.units.find(x=>x.id==b.dataset.u);
    const l=u.lessons.find(x=>x.id===b.dataset.l);
    render(lessonScreen,u,l);});
  const rv=$('#review'); if(rv)rv.onclick=()=>render(reviewScreen);
  $('#goal').onchange=async e=>{S.goal=+e.target.value; await kvSet('goal',S.goal);};
  $('#logout').onclick=e=>{e.preventDefault();
    firebase.auth().signOut().then(()=>location.reload());};
}

/* ---------- Генерация упражнений ---------- */
function distractors(word,n,field){
  const pool=S.wordbank.words.filter(w=>w.freq_rank!==word.freq_rank);
  const out=[]; const used=new Set([field==='word'?word.word:shortTr(word)]);
  while(out.length<n&&pool.length){
    const w=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    const v=field==='word'?w.word:shortTr(w);
    if(!used.has(v)){used.add(v);out.push(v);}
  }
  return out;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];}return a;}

function buildTasks(ranks,withIntro){
  const tasks=[];
  for(const r of ranks){
    const w=S.byRank[r]; if(!w)continue;
    const isNew=!S.srs[r];
    if(withIntro&&isNew)tasks.push({type:'intro',r});
  }
  for(const r of ranks)if(S.byRank[r])tasks.push({type:'ky2ru',r});
  for(const r of ranks)if(S.byRank[r])tasks.push({type:'ru2ky',r});
  for(const r of ranks)if(S.byRank[r])tasks.push({type:'type',r});
  return tasks;}

/* ---------- Урок / повторение ---------- */
function lessonScreen(unit,lesson){
  runSession(buildTasks(lesson.word_ranks,true),async results=>{
    S.doneLessons[lesson.id]=true;
    await kvSet('doneLessons',S.doneLessons);
    await finishSession(results,`Урок пройден!`);
  });
}
function reviewScreen(){
  const ranks=shuffle(dueRanks()).slice(0,10);
  runSession(buildTasks(ranks,false),async results=>{
    await finishSession(results,`Повторение пройдено!`);
  });
}
async function finishSession(results,title){
  let xp=0;
  for(const[r,errs]of Object.entries(results)){
    const st=S.srs[r]||srsInit();
    S.srs[r]=srsOnResult(st,errs===0);
    await kvSet(r,S.srs[r],'srs');
    xp+=errs===0?3:1;
  }
  S.xp+=xp; await kvSet('xp',S.xp);
  await registerActivity();
  app.innerHTML=`<div class="center" style="padding-top:20vh">
    <div class="big">🎉</div><h1>${esc(title)}</h1>
    <p>+${xp} XP · 🔥 ${S.streak.count} · цель: ${S.doneToday}/${S.goal}</p>
    <button class="btn" id="cont">Дальше</button></div>`;
  $('#cont').onclick=()=>render(home);
}

function runSession(tasks,onDone){
  const queue=[...tasks];
  const errors={}; // rank -> число ошибок
  let total=queue.length, done=0;

  function head(){
    app.innerHTML=`<div class="topbar">
      <button style="background:none;font-size:22px" id="close">✕</button>
      <div class="bar"><div style="width:${100*done/total}%"></div></div>
      <span class="stat">${done}/${total}</span></div><div id="ex"></div>`;
    $('#close').onclick=()=>{if(confirm('Выйти из урока? Прогресс урока не сохранится.'))render(home);};
  }
  function next(){
    if(!queue.length){onDone(errors);return;}
    head();
    const t=queue[0];
    const w=S.byRank[t.r];
    const ex=$('#ex');
    const flag=w.status&&w.status.includes('needs native')
      ?`<div class="flag">⚠ перевод не проверен носителем</div>`:'';

    const finishTask=ok=>{
      done+=1;
      if(!ok){errors[t.r]=(errors[t.r]||0)+1; total+=1;
        queue.push(queue[0]);} // повтор в конец
      queue.shift();
      setTimeout(next, ok?600:1300);
    };

    if(t.type==='intro'){
      errors[t.r]=errors[t.r]||0;
      ex.innerHTML=`<div class="card center"><div class="hint">Новое слово</div>
        <div class="kyword">${esc(w.word)}</div>
        <div class="ruword">${esc(shortTr(w))}</div>
        ${w.translation2?`<div class="hint">также: ${esc(w.translation2.slice(0,60))}</div>`:''}
        <div class="hint">${esc(findTopic(t.r))}</div>${flag}</div>
        <button class="btn" id="ok">Понятно</button>`;
      $('#ok').onclick=()=>{done+=1;queue.shift();next();};
      return;
    }
    if(t.type==='ky2ru'||t.type==='ru2ky'){
      const q=t.type==='ky2ru'?w.word:shortTr(w);
      const ans=t.type==='ky2ru'?shortTr(w):w.word;
      const field=t.type==='ky2ru'?'tr':'word';
      const opts=shuffle([ans,...distractors(w,3,field==='word'?'word':'tr')]);
      ex.innerHTML=`<p class="hint">${t.type==='ky2ru'?'Выбери перевод':'Выбери кыргызское слово'}</p>
        <div class="kyword" style="font-size:${t.type==='ky2ru'?30:20}px">${esc(q)}</div>${flag}
        ${opts.map(o=>`<button class="opt">${esc(o)}</button>`).join('')}`;
      document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
        const ok=b.textContent===ans;
        b.classList.add(ok?'ok':'bad');
        if(!ok)document.querySelectorAll('.opt').forEach(x=>{
          if(x.textContent===ans)x.classList.add('ok');});
        document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        finishTask(ok);});
      return;
    }
    if(t.type==='type'){
      ex.innerHTML=`<p class="hint">Напиши по-кыргызски</p>
        <div class="ruword" style="font-weight:700">${esc(shortTr(w))}</div>${flag}
        <input type="text" id="inp" autocomplete="off" autocapitalize="off" lang="ky">
        <div class="kyletters">${['ө','ү','ң'].map(c=>
          `<button data-c="${c}">${c}</button>`).join('')}</div>
        <button class="btn" id="check">Проверить</button><div id="fb"></div>`;
      const inp=$('#inp'); inp.focus();
      document.querySelectorAll('.kyletters button').forEach(b=>b.onclick=()=>{
        const s=inp.selectionStart||inp.value.length;
        inp.value=inp.value.slice(0,s)+b.dataset.c+inp.value.slice(s);
        inp.focus(); inp.selectionStart=inp.selectionEnd=s+1;});
      const check=()=>{
        const norm=s=>s.toLowerCase().replace(/ё/g,'е').trim().replace(/\s+/g,' ');
        const ok=norm(inp.value)===norm(w.word);
        $('#fb').innerHTML=`<div class="feedback ${ok?'ok':'bad'}">
          ${ok?'Верно!':'Правильно: '+esc(w.word)}</div>`;
        $('#check').disabled=true; inp.disabled=true;
        finishTask(ok);};
      $('#check').onclick=check;
      inp.onkeydown=e=>{if(e.key==='Enter'&&!$('#check').disabled)check();};
      return;
    }
  }
  next();
}
function findTopic(r){
  for(const u of S.course.units)
    for(const w of u.words)
      if(w.freq_rank===r)return w.topic+(w.topic_source==='LLM'?' (тема: ИИ)':'');
  return '';}

/* ---------- Запуск ---------- */
(async function(){
  idb=await idbOpen();
  await loadMeta();
  firebase.auth().onAuthStateChanged(async u=>{
    if(!u){render(loginScreen);return;}
    S.user=u;
    app.innerHTML=`<div class="center" style="padding-top:30vh">Загружаю курс…</div>`;
    S.srs=await srsAll();
    await loadContent();
  });
  if('serviceWorker'in navigator)
    navigator.serviceWorker.register('sw.js').catch(()=>{});
})();
</script>
</body>
</html>
